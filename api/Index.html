// Appel direct /api/jobs — même domaine, zéro CORS
async function searchAdzuna(what,where,salMin,ct,page){
  page=page||1;
  var p=new URLSearchParams({what:what,where:where,results_per_page:"8",page:String(page)});
  if(salMin)p.set("salary_min",String(salMin));
  if(ct)p.set("contract_type",ct);
  var r=await fetch("/api/jobs?"+p.toString());
  if(!r.ok){var d=await r.json().catch(function(){return{};});throw new Error("Erreur "+r.status+(d.error?" : "+d.error:""));}
  return(await r.json()).results||[];
}

async function extractPdfText(file){
  var ab=await file.arrayBuffer();
  var pdf=await pdfjsLib.getDocument({data:ab}).promise;
  var text="";
  for(var i=1;i<=Math.min(pdf.numPages,5);i++){
    var page=await pdf.getPage(i);
    var c=await page.getTextContent();
    text+=c.items.map(function(x){return x.str;}).join(" ")+"\n";
  }
  return text.trim();
}

async function callClaude(prompt,system,maxTokens){
  maxTokens=maxTokens||1000;
  var r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,
      ...(system&&{system:system}),messages:[{role:"user",content:prompt}]})
  });
  var d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.content.map(function(b){return b.text||"";}).join("");
}

function safeJSON(str){
  var c=(str||"").replace(/```json|```/g,"").trim();
  try{return JSON.parse(c);}catch(e){}
  var m=c.match(/\[[\s\S]*\]/)||c.match(/\{[\s\S]*\}/);
  if(m)try{return JSON.parse(m[0]);}catch(e){}
  return null;
}

async function dlDocx(text,fname){
  var lines=text.split("\n").filter(function(l){return l.trim();});
  var doc=new docx.Document({sections:[{properties:{page:{margin:{top:1440,right:1440,bottom:1440,left:1440}}},
    children:lines.map(function(line){return new docx.Paragraph({
      children:[new docx.TextRun({text:line,size:24,font:"Times New Roman"})],
      spacing:{after:180},alignment:docx.AlignmentType.JUSTIFIED
    });})}]});
  var blob=await docx.Packer.toBlob(doc);
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=fname.replace(/[^a-z0-9_\-.]/gi,"_")+".docx";
  a.click();
}

function fmtSalary(min,max){
  if(min&&max)return min.toLocaleString("fr-FR")+" – "+max.toLocaleString("fr-FR")+" €/an";
  if(min)return"À partir de "+min.toLocaleString("fr-FR")+" €/an";
  if(max)return"Jusqu'à "+max.toLocaleString("fr-FR")+" €/an";
  return null;
}

            sal&&h("p",{style:{fontSize:13,color:C.accent,fontWeight:600,marginBottom:8}},sal),
            h("p",{style:{fontSize:13,color:C.muted,lineHeight:1.7,marginBottom:10}},(job.description||"").slice(0,160),"…"),
            job.matchReasons&&job.matchReasons.length>0&&h("div",{style:{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}},
              job.matchReasons.map(function(r,j){return h("span",{key:j,style:{fontSize:11,padding:"3px 10px",borderRadius:20,background:"rgba(158,248,124,0.1)",color:C.accent,border:"1px solid rgba(158,248,124,0.25)"}},r);})),
            h("div",{style:{display:"flex",gap:10,alignItems:"center"}},
              h("button",{style:Object.assign(btn("primary"),{fontSize:13,padding:"7px 16px"}),onClick:function(){generateLetter(job);}},"✉ Générer ma lettre"),
              job.redirect_url&&job.redirect_url!=="#"&&h("a",{href:job.redirect_url,target:"_blank",rel:"noreferrer",style:{fontSize:13,color:C.muted}},"Voir l'offre →")));
        })),
      visCount<allJobs.length&&h("div",{style:{textAlign:"center",marginTop:20}},
        h("button",{style:btn("ghost"),onClick:function(){setVisCount(function(v){return v+4;});}},"Voir plus ↓"))),

    // COVER
    step==="cover"&&h("div",null,
      h("button",{onClick:function(){setStep("results");},style:Object.assign(btn("ghost"),{marginBottom:24,fontSize:13,padding:"6px 14px"})},"← Retour aux offres"),
      h("h2",{style:{fontSize:28,fontWeight:700,marginBottom:4}},"Lettre de motivation"),
      h("p",{style:{color:C.muted,fontSize:14,marginBottom:24}},selJob&&selJob.title," · ",selJob&&selJob.company&&selJob.company.display_name),
      busy
        ?h("div",{style:{textAlign:"center",padding:"4rem 0"}},
            h("div",{style:{width:50,height:50,borderRadius:"50%",border:"3px solid "+C.border,borderTopColor:C.accent,animation:"spin 1s linear infinite",margin:"0 auto 16px"}}),
            h("p",{style:{color:C.muted}},"Rédaction en cours…"))
        :h("div",null,
            h("div",{style:card({whiteSpace:"pre-wrap",lineHeight:1.9,fontSize:14,maxHeight:460,overflowY:"auto",marginBottom:14})},letter),
            h("div",{style:{display:"flex",gap:10,flexWrap:"wrap"}},
              h("button",{style:Object.assign(btn("primary"),{padding:"10px 20px"}),onClick:function(){dlDocx(letter,"lettre_"+((selJob&&selJob.company&&selJob.company.display_name)||"poste"));}},"⬇ Télécharger .docx"),
              h("button",{style:btn(),onClick:function(){navigator.clipboard.writeText(letter);setCopied(true);setTimeout(function(){setCopied(false);},2000);}},copied?"✓ Copié !":"Copier le texte"),
              h("button",{style:btn("ghost"),onClick:function(){generateLetter(selJob);}},"↺ Régénérer"))))
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
